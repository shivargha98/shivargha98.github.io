<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <script>
      // Stash the requested path and bounce to the SPA entry point
      sessionStorage.setItem(
        'spa-redirect',
        location.pathname + location.search + location.hash
      )
      location.replace('/')
    </script>
  </head>
  <body></body>
</html>
